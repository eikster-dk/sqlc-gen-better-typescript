# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: sqlc-effect

before:
  hooks:
    - go mod tidy

builds:
  - id: plugin
    env:
      - CGO_ENABLED=0
    goos:
      - wasip1
    goarch:
      - wasm

archives:
  - id: dist
    builds:
      - plugin
    formats: binary
    name_template: "{{ .ProjectName }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: eikster-dk
    name: sqlc-effect
  header: |
    ## sqlc-effect ({{ .Date }})

    To update to this version, use the following in your `sqlc.yaml`:

    ```yaml
    version: '2'
    plugins:
    - name: effect
      wasm:
        url: https://github.com/eikster-dk/sqlc-effect/releases/download/{{ .Tag }}/sqlc-effect.wasm
        sha256: {{ trimsuffix .Checksums "  sqlc-effect.wasm\n" }}
    ```
